<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 378">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
    ]]></style>
    <clipPath id="oval">
      <ellipse cx="250" cy="187" rx="228" ry="164"/>
    </clipPath>
  </defs>

  <!-- White oval background -->
  <ellipse cx="250" cy="187" rx="228" ry="164" fill="white"/>

  <!-- Bottom wave/mound fill (clipped to oval) -->
  <path
    d="M 22 252
       Q 95 182 178 222
       Q 214 242 250 210
       Q 286 178 338 208
       Q 398 240 478 222
       L 478 352 H 22 Z"
    fill="#0C3680"
    clip-path="url(#oval)"
  />

  <!-- White separator lines between the three mound sections -->
  <path d="M 210 240 Q 206 295 204 352" fill="none" stroke="white" stroke-width="9" stroke-linecap="round" clip-path="url(#oval)"/>
  <path d="M 336 210 Q 340 270 342 352" fill="none" stroke="white" stroke-width="9" stroke-linecap="round" clip-path="url(#oval)"/>

  <!-- "Sal Vita" text -->
  <text
    x="250"
    y="196"
    text-anchor="middle"
    font-family="Pacifico, 'Brush Script MT', cursive"
    font-size="90"
    fill="#0C3680"
  >Sal Vita</text>

  <!-- Oval border (rendered last to cover wave overflow) -->
  <ellipse cx="250" cy="187" rx="228" ry="164" fill="none" stroke="#0C3680" stroke-width="15"/>
</svg>
