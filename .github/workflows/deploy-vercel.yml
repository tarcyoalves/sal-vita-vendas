name: Deploy to Vercel (sal-vita-vendas)
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: node node_modules/vite/bin/vite.js build client -c vite.config.ts

      - name: Build API bundle
        run: node_modules/.bin/esbuild api/index.ts --bundle --platform=node --target=node20 --outfile=api/bundle.js --external:pg-native --external:fsevents

      - name: Trigger Vercel deploy hook
        run: |
          response=$(curl -s -X POST \
            "https://api.vercel.com/v1/integrations/deploy/prj_xpZOPvJsMdf7uEs6LX67fx5i0Ro8/FkpvHZSnB1")
          echo "Response: $response"
          echo "$response" | grep -q '"state":"PENDING"' && echo "✅ Deploy triggered" || echo "❌ Deploy failed"
